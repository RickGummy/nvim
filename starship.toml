format = "$username$directory$git_branch$git_status$character"

[username]
show_always = true
style_user = "bold green"
format = "[$user]($style) "

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = ""
style = "purple"
format = "[($branch)]($style)"

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"

[character]
success_symbol = "[→](bold green)"
error_symbol = "[→](bold red)"
